# correlation_searches.conf — deployable Splunk searches for the absence/join-based
# detections that Sigma can't express cleanly.
#
# These are the worked deploy form of the three "deferred to SPL" rows in
# ../../README.md: Golden Ticket, Silver Ticket, and NTLM relay all detect either
# the ABSENCE of an expected event or a field-to-field comparison, neither of which
# Sigma models. They live here as Splunk saved searches (Kali's PURPLE-TEAM.md
# carries the same SPL inline via the htpx pairs). Drop into
# $SPLUNK_HOME/etc/apps/<app>/local/. Field names follow the Splunk Windows TA;
# normalize to your CIM. Validate each by running the paired attack from dotfiles-Kali.

[Golden Ticket - TGS without preceding TGT (T1558.001)]
search = index=main EventCode IN (4768,4769) Account_Name!="*$" \
| eval kind=if(EventCode==4768,"tgt","tgs") \
| stats count(eval(kind=="tgt")) AS tgts count(eval(kind=="tgs")) AS tgs_reqs by Account_Name, Client_Address \
| where tgs_reqs > 0 AND tgts == 0
description = A forged TGT is minted offline, so the account uses service tickets (4769) with no DC-issued TGT (4768). htpx pair: golden-ticket / golden-ticket-4769. Set the search window to your ticket-renewal cadence.
dispatch.earliest_time = -4h
cron_schedule = 12 * * * *
enableSched = 1
alert.severity = 5
action.notable = 1

[Silver Ticket - Kerberos service logon without 4769 (T1558.002)]
search = index=main EventCode=4624 Logon_Type=3 Authentication_Package_Name="Kerberos" Account_Name!="*$" \
| join type=left Account_Name [ search index=main EventCode=4769 | stats count AS tgs_issued by Account_Name ] \
| where isnull(tgs_issued) \
| table _time, host, Account_Name, Source_Network_Address
description = Soft. A silver ticket never touches the DC, so a Kerberos network logon (4624 t3) with no matching 4769 is the (absence) tell. The subsearch inherits this search's time range - do not hard-code a window. PAC validation is the durable control. htpx pair: silver-ticket / silver-ticket-4769.
dispatch.earliest_time = -4h
cron_schedule = 18 * * * *
enableSched = 1
alert.severity = 3
action.notable = 1

[NTLM relay - 4624 workstation/source mismatch (T1557.001)]
search = index=main EventCode=4624 Workstation_Name!="-" Source_Port!="0" \
| eval RelayedFrom=if(host!=Workstation_Name, Workstation_Name, "") \
| lookup dnslookup clienthost AS RelayedFrom OUTPUT clientip AS IP \
| where RelayedFrom!="" AND Source_Network_Address!=IP \
| table _time, host, Account_Name, Source_Network_Address, RelayedFrom, IP
description = A relayed logon carries the victim's workstation name but arrives from the relay's source address - so a 4624 whose Workstation_Name doesn't resolve to its Source_Network_Address is the invariant. Needs a dnslookup lookup. htpx pair: ntlm-relay-ntlmrelayx / ntlm-relay-4624.
dispatch.earliest_time = -1h
cron_schedule = 24 * * * *
enableSched = 1
alert.severity = 5
action.notable = 1
