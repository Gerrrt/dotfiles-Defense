# savedsearches.generated.conf — GENERATED by detections/siem/gen-siem.sh. DO NOT EDIT.
#
# Reproducible compile of every Sigma rule in detections/sigma/ to its Splunk
# savedsearches deploy form. Regenerate with detections/siem/gen-siem.sh; CI drift-gates
# it with `gen-siem.sh --check`. Windows dirs use the splunk_windows TA pipeline; the
# non-Windows platform dirs compile with raw logical field names (normalize to your CIM
# before deploying). The hand-authored savedsearches.conf / correlation_searches.conf /
# sentinel/ forms alongside this file cover the enriched, absence/join, and Sentinel
# detections a bare compile can't emit.

[default]
dispatch.earliest_time = -60m
dispatch.latest_time = now

### credential_access (splunk_windows)

[AS-REP roast / Kerbrute user probing (4771 0x18)]
description = Detects one client address generating Kerberos pre-auth failures (0x18) across \
many distinct accounts - the AS-REP roast / username-enumeration tell. A real \
user fat-fingers their own name, not five-plus others. \
Validate (purple): run "kerbrute userenum" / GetNPUsers from dotfiles-Kali \
(hacktheplanet "Microsoft Windows Kerberos" fold; htpx pair asreproast-getnpusers).
search = source="WinEventLog:Security" EventCode=4771 Status="0x18" \
 \
| bin _time span=10m \
| stats dc(TargetUserName) as value_count by _time IpAddress \
 \
| search value_count >= 5

[DCSync - directory replication right requested by a non-DC]
description = Detects DCSync: a 4662 directory-access event requesting the \
DS-Replication-Get-Changes-All extended right. Legitimate replication comes from \
DC machine accounts, so a user/admin principal requesting it is the anomaly - \
the replication right is the invariant the technique cannot avoid. \
Validate (purple): run impacket-secretsdump -just-dc from dotfiles-Kali \
(hacktheplanet "DCSync / NTDS dump" fold; htpx pair dcsync-secretsdump). \
Requires the Directory Service Access audit subcategory + a SACL on the domain \
head granting auditing of the replication right.
search = source="WinEventLog:Security" EventCode=4662 Properties IN ("*1131f6aa-9c07-11d1-f79f-00c04fc2dcd2*", "*1131f6ad-9c07-11d1-f79f-00c04fc2dcd2*", "*89e95b76-444d-4c62-991a-0facbeda640c*") NOT (SubjectUserName="*$" OR SubjectUserSid="S-1-5-18")

[GPP cpassword hunt - SYSVOL preferences XML read by a user]
description = Detects the on-wire moment of a GPP cpassword hunt: a 5145 detailed file-share \
access on the SYSVOL share whose relative target is a credential-bearing Group \
Policy Preferences XML. The decrypt is offline (Microsoft published the AES key), \
so the read is the only telemetry. Scope to interactive accounts - Group Policy \
clients (machine accounts) read these legitimately. \
Validate (purple): run "nxc -M gpp_password" from dotfiles-Kali (hacktheplanet \
SMB fold; htpx pair gpp-cpassword). Honey-policy a fake Groups.xml for a \
near-zero-FP tripwire. Requires detailed file-share auditing on DCs.
search = source="WinEventLog:Security" EventCode=5145 ShareName="*SYSVOL*" RelativeTargetName IN ("*Groups.xml", "*Services.xml", "*ScheduledTasks.xml", "*Printers.xml", "*DataSources.xml") NOT SubjectUserName="*$"

[Kerberoasting - RC4 service ticket for a user SPN]
description = Detects the Kerberoasting invariant: an RC4 (0x17) TGS-REQ for a non-machine, \
non-krbtgt SPN. The encryption downgrade is the tell even when ticket flags look \
normal - roasting tools force RC4 to keep the hash crackable. Detect on the \
downgrade, not the tool name or count. \
Validate (purple): run the "Microsoft Windows Kerberos" Kerberoast fold in \
dotfiles-Kali/offensive/hacktheplanet (htpx pair: kerberoast-getuserspns <-> this); \
confirm the 4769 fires with Ticket_Encryption_Type 0x17.
search = source="WinEventLog:Security" EventCode=4769 TicketEncryptionType="0x17" NOT (ServiceName IN ("*$", "krbtgt"))

[LSASS process access with dump-shaped rights]
description = Detects credential theft from memory: a handle to lsass.exe with read/dump \
access rights, from a process that is not a known security/AV engine. Sysmon 10 \
(ProcessAccess) sees this far better than the Security log; the GrantedAccess \
masks below are the classic dump-capable combinations (0x1010, 0x1410, 0x1438, \
0x143a, 0x1fffff). \
Validate (purple): run "nxc -M lsassy" / a remote LSASS dump from dotfiles-Kali \
(hacktheplanet "Lateral movement" fold; htpx pair lsass-dump-lsassy). Tune the \
SourceImage allowlist to your EDR/AV.
search = TargetImage="*\\lsass.exe" GrantedAccess IN ("0x1010", "0x1410", "0x1438", "0x143a", "0x1fffff") NOT (SourceImage IN ("*\\MsMpEng.exe*", "*\\MsSense.exe*", "*\\wininit.exe*", "*\\csrss.exe*"))

[NTDS.dit theft via ntdsutil / VSS on a domain controller]
description = Detects local NTDS.dit extraction on a DC, which sidesteps the DCSync 4662 \
replication detection entirely: ntdsutil with an ifm/create-full argument, or \
vssadmin/diskshadow/wbadmin creating a shadow copy to copy NTDS.dit + the SYSTEM \
hive out. Almost nothing legitimately runs "ntdsutil ... ifm" outside a planned \
DC backup/migration. Corroborate with event 8222 (shadow copy created). \
Validate (purple): run the ntdsutil/VSS dump from dotfiles-Kali (hacktheplanet \
"DCSync / NTDS dump" fold; htpx pair ntds-ntdsutil). Scope to DC hosts.
search = (Image="*\\ntdsutil.exe" CommandLine IN ("*ifm*", "*create full*")) OR (CommandLine IN ("*vssadmin create shadow*", "*wbadmin start backup*") Image IN ("*\\vssadmin.exe", "*\\wbadmin.exe")) OR Image="*\\diskshadow.exe"

[Password spray - one source, many accounts (4625)]
description = Detects one source address failing against many distinct accounts in a short \
window - the spray shape, the inverse of one user fat-fingering their own \
password. Counting distinct accounts per source beats a raw failure-rate \
threshold because the spray is deliberately slow. \
Validate (purple): run kerbrute/nxc password spray from dotfiles-Kali \
(hacktheplanet "Microsoft Windows Kerberos" / "Poisoning & relay" folds).
search = source="WinEventLog:Security" EventCode=4625 NOT (IpAddress IN ("-", "127.0.0.1", "::1")) \
 \
| bin _time span=15m \
| stats dc(TargetUserName) as value_count by _time IpAddress \
 \
| search value_count >= 10

### privilege_escalation (splunk_windows)

[AD CS certificate request (ESC1 triage surface)]
description = Surfaces certificate-request activity (4886/4887) for ESC1 / relay-to-ADCS \
triage. The ESC1 invariant is a request whose subjectAltName names a *different* \
principal than the requester - but that is a field-to-field comparison Sigma \
cannot express, so this rule deliberately selects the request events and leaves \
the SAN-vs-Requester comparison to the analyst / a correlation in the backend \
(pull the requested UPN from the 4886 and compare to Requester). It is therefore \
a broad triage surface, not a high-fidelity alert on its own - pair it with a \
baseline of enrollment agents and watch 5136 writes to userCertificate. \
Validate (purple): run "certipy-ad req ... -upn administrator" from dotfiles-Kali \
(hacktheplanet "AD CS abuse" fold; htpx pair adcs-esc1-certipy). Requires CA \
request auditing (auditpol / CA "Issued requests" logging) to populate 4886/4887.
search = source="WinEventLog:Security" EventCode IN (4886, 4887)

[Potato privesc - service identity spawning an interactive shell]
description = Detection posture: moderate. SeImpersonate abuse (PrintSpoofer/GodPotato/Juicy) \
uses a legitimate impersonation API, and 4688 alone cannot show the run-as-SYSTEM \
result. This flags the shape it can see - a service identity (app-pool / machine \
account / NETWORK|LOCAL SERVICE) spawning cmd/powershell. Confirm the SYSTEM \
outcome with Sysmon 17/18 on the spoolss/DCOM named pipe and Sysmon 1 linking the \
service parent to a SYSTEM child. \
Validate (purple): run PrintSpoofer/GodPotato from dotfiles-Kali (hacktheplanet \
"Windows privilege escalation" fold; htpx pair potato-seimpersonate).
search = Image IN ("*\\cmd.exe", "*\\powershell.exe", "*\\pwsh.exe") User IN ("*APPPOOL*", "*NETWORK SERVICE*", "*LOCAL SERVICE*")

[RBCD abuse - msDS-AllowedToActOnBehalfOfOtherIdentity write]
description = Detects resource-based constrained delegation abuse: a 5136 event writing \
msDS-AllowedToActOnBehalfOfOtherIdentity on a computer object. Configuring RBCD \
requires this write, so it is the invariant. Legitimately an admin delegating a \
service sets it; a write sourced from a normal user onto a computer object is the \
anomaly. Pair with a 4741 computer-account-created burst (the attacker's machine \
account) for higher fidelity. \
Validate (purple): run the impacket addcomputer/rbcd/getST chain from dotfiles-Kali \
(hacktheplanet "Active Directory - attack paths" fold; htpx pair rbcd-impacket). \
Requires the Directory Service Changes audit subcategory + a SACL.
search = source="WinEventLog:Security" EventCode=5136 AttributeLDAPDisplayName="msDS-AllowedToActOnBehalfOfOtherIdentity" NOT SubjectUserName="svc_delegation"

[Shadow Credentials - msDS-KeyCredentialLink write]
description = Detects Shadow Credentials: a 5136 directory-object-modified event writing the \
msDS-KeyCredentialLink attribute. The attack must write this attribute to add an \
attacker-controlled key for PKINIT, so the write is the invariant. Almost nothing \
legitimately writes it except Windows Hello for Business enrollment - allowlist \
those sources and alert on the rest. \
Validate (purple): run "certipy-ad shadow auto" from dotfiles-Kali (hacktheplanet \
"Active Directory - attack paths" fold; htpx pair shadow-credentials-certipy). \
Requires the Directory Service Changes audit subcategory + a SACL on the objects.
search = source="WinEventLog:Security" EventCode=5136 AttributeLDAPDisplayName="msDS-KeyCredentialLink"

### lateral_movement (splunk_windows)

[RDP session hijack - tscon redirect to an RDP endpoint]
description = Detects RDP session hijacking: a process creation carrying a \
"tscon ... /dest:rdp-tcp#" command line. The hijack cannot happen without it, so \
this is a near-zero-false-positive tell - admins almost never tscon to another \
session's RDP endpoint by hand, and the SYSTEM-via-service variant \
(sc create ... tscon) is even louder. \
Validate (purple): run the tscon/sc-create hijack from dotfiles-Kali (hacktheplanet \
"Lateral movement & remote execution" fold; htpx pair rdp-hijack-tscon).
search = CommandLine="*/dest:rdp-tcp#*"

[Suspicious service installed (psexec-style remote exec)]
description = Detects a new service install (7045) whose binary path is the psexec/remote-exec \
shape: a random/short service name pointing at cmd/powershell, a %SystemRoot% drop, \
or an ADMIN$ path. psexec-class lateral movement (impacket-psexec, smbexec) leaves \
this even when the service name is randomized - detect on the binary path shape and \
allowlist your known services. \
Validate (purple): run impacket-psexec from dotfiles-Kali (hacktheplanet "Lateral \
movement & remote execution" / "Active Directory" folds; pairs with pth-lateral-nxc).
search = source="WinEventLog:System" EventCode=7045 ImagePath IN ("*\\cmd.exe*", "*powershell*", "*%COMSPEC%*", "*\\ADMIN$\\*", "*\\Temp\\*", "*\\Users\\*")

[WMI remote exec - shell spawned by WmiPrvSE]
description = Detects WMI-based remote execution (impacket-wmiexec, nxc --exec-method wmiexec): \
the payload runs as a child of WmiPrvSE.exe with no service install (7045) to \
catch. A process creation whose parent is WmiPrvSE.exe spawning cmd/powershell is \
the signal - especially with impacket's "cmd.exe /Q /c ... 1> \\127.0.0.1\ADMIN$" \
output-redirect shape. Legit WMI providers spawn children too, so pair the parent \
with a shell target and the SMB output-redirect string. \
Validate (purple): run impacket-wmiexec from dotfiles-Kali (hacktheplanet "Lateral \
movement & remote execution" fold; htpx pair wmiexec-impacket).
search = (ParentImage="*\\WmiPrvSE.exe" Image IN ("*\\cmd.exe", "*\\powershell.exe", "*\\pwsh.exe")) OR (CommandLine="*/Q*" CommandLine="*/c*" CommandLine="*127.0.0.1\\ADMIN$*")

### persistence (splunk_windows)

[Scheduled task created with a suspicious action]
description = Detects scheduled-task persistence: a 4698 task-created event whose task XML runs \
encoded/hidden PowerShell, a LOLBin (mshta/regsvr32/rundll32), or something from a \
user-writable/temp path. Detect on the action, not the task name; 4702 catches the \
modify-an-existing-task variant. Baseline your software's legit tasks and alert on \
the rest. \
Validate (purple): run schtasks /create (or nxc -M schtask_as) from dotfiles-Kali \
(hacktheplanet "Persistence" fold; htpx pair schtask-persist). Requires the \
Object Access > Other Object Access Events audit subcategory.
search = source="WinEventLog:Security" EventCode=4698 TaskContent IN ("*-enc*", "*-EncodedCommand*", "*-w hidden*", "*-WindowStyle Hidden*", "*FromBase64String*", "*\\Users\\*", "*\\Temp\\*", "*\\mshta.exe*", "*\\regsvr32.exe*", "*\\rundll32.exe*", "*DownloadString*", "*IEX*")

[WMI event subscription persistence - command-line consumer]
description = Detects fileless WMI event-subscription persistence: Sysmon 20 (WmiConsumer) \
registering a CommandLineEventConsumer whose Destination runs PowerShell/cmd/a \
LOLBin. The subscription lives in the WMI repository, survives reboot, runs as \
SYSTEM, and touches no Run key or scheduled task - the Security log barely sees \
it, but Sysmon does. This keys on the consumer (event 20) because that is what \
carries the command; the binding (event 21) and filter (event 19) carry no \
Destination, so treat any *new* binding as its own separate low-volume alert \
rather than folding it in here. Legitimate permanent consumers are rare and \
usually from known management software; allowlist those and alert on the rest. \
Validate (purple): run "nxc -M wmi-event" / PowerLurk from dotfiles-Kali \
(hacktheplanet "Persistence" fold; htpx pair wmi-subscription). Requires Sysmon \
with WMI eventing enabled (config schema >= 4.1).
search = EventCode=20 Destination IN ("*powershell*", "*cmd.exe*", "*mshta*", "*wscript*", "*cscript*", "*rundll32*", "*-enc*", "*FromBase64String*")

### defense_evasion (splunk_windows)

[DCShadow - rogue DC registration (GC SPN added to a non-DC)]
description = Detects DCShadow: to push changes as fake DC-to-DC replication, the attacker \
must briefly make the directory treat a non-DC as a DC, which adds a global- \
catalog SPN (GC/...) to a computer account (4742) and creates an nTDSDSA/server \
object (5137). The GC SPN write onto an account that isn't an established domain \
controller is the cleanest invariant. Corroborate with 5137 creating an \
nTDSDSA/server object and 4662 replication sourced from outside your DC inventory. \
Validate (purple): run mimikatz lsadump::dcshadow from dotfiles-Kali (hacktheplanet \
"Active Directory - attack paths" fold; htpx pair dcshadow). Allowlist your real \
DC computer accounts below.
search = source="WinEventLog:Security" EventCode=4742 ServicePrincipalNames="*GC/*" NOT (TargetUserName IN ("DC1$", "DC2$"))

### cloud (--without-pipeline)

[AWS IAM access key created (backdoor triage)]
description = Surfaces CloudTrail CreateAccessKey for IAM access-key-backdoor triage. The abuse \
invariant is actor != target (a principal minting a key for another, usually more \
privileged, user) - but that field-to-field comparison isn't expressible in Sigma, \
so this matches the event and leaves the actor-vs-target call to the analyst / \
backend. Compare userIdentity (actor) to requestParameters.userName (target); \
alert when they differ or the target is privileged. \
Validate (purple): run "aws iam create-access-key --user-name <other>" / Pacu \
iam__backdoor_users_keys from dotfiles-Kali (htpx pair aws-iam-backdoor-key).
search = eventSource="iam.amazonaws.com" eventName="CreateAccessKey"

[AWS IAM login profile created or updated (console takeover)]
description = Detects CloudTrail CreateLoginProfile / UpdateLoginProfile - giving a \
programmatic-only IAM user a console password, or resetting another user's, is \
account takeover. A login profile is normally set once at user creation by an \
admin, and users reset only their own, so CreateLoginProfile on an existing user \
or UpdateLoginProfile where actor != target is the tell. Pairs with the \
CreateAccessKey alert for the full console+API takeover. \
Validate (purple): run "aws iam create-login-profile --user-name <other>" from \
dotfiles-Kali (htpx pair aws-console-login-profile).
search = eventSource="iam.amazonaws.com" eventName IN ("CreateLoginProfile", "UpdateLoginProfile")

[Entra consent grant to a third-party app (illicit-consent triage)]
description = Surfaces OAuth consent-grant events in Entra ID for illicit-consent triage: a \
"Consent to application" / delegated-permission-grant audit event. It matches the \
consent operation broadly - the "illicit" call is a triage step, not something \
this rule can decide alone, so treat it as a triage surface rather than a \
high-fidelity alert. The abuse case is a user granting high-value mail/file scopes \
(Mail.Read, offline_access, Files.Read.All) to a third-party app, yielding a \
refresh token to their data with no password and no MFA on reuse, surviving \
password resets. Triage by app, scopes, and whether the app is newly registered/ \
unverified; restricting user consent to verified publishers turns this into \
prevention. \
Validate (purple): run an illicit-consent grant from dotfiles-Kali (htpx pair \
consent-grant; companion-only, M365/Entra section).
search = OperationName IN ("Consent to application", "Add delegated permission grant", "Add OAuth2PermissionGrant")

[Entra service-principal credential added (app backdoor)]
description = Detects a credential (client secret or certificate) being added to an Entra app \
registration / service principal - the durable cloud backdoor: the attacker then \
authenticates as the app, non-interactive, no MFA, surviving user password resets. \
The credential-add audit event is the invariant; triage by who did it, which \
(privileged) app it targets, and whether it lines up with a normal app-lifecycle \
change. A credential added to a high-privilege app by an unexpected actor is the \
tell. \
Validate (purple): run "az ad app credential reset" / Add-MgApplicationPassword \
from dotfiles-Kali (htpx pair sp-cred-backdoor; companion-only, M365/Entra section).
search = OperationName IN ("Add service principal credentials", "Add application credentials", "Update application - Certificates and secrets management", "Update application – Certificates and secrets management")

[GCP user-managed service-account key created]
description = Detects creation of a user-managed service-account key \
(google.iam.admin.v1.CreateServiceAccountKey) in GCP Cloud Audit Logs. These keys \
are long-lived credentials outside SSO/MFA and are the classic GCP persistence \
backdoor - Google recommends disabling them. Alert on creation for privileged \
service accounts, by unexpected actors, or anywhere org policy forbids user-managed \
keys; the org-policy constraint iam.disableServiceAccountKeyCreation is the \
preventive control. \
Validate (purple): run "gcloud iam service-accounts keys create" from dotfiles-Kali \
(htpx pair gcp-sa-key).
search = gcp.audit.method_name="google.iam.admin.v1.CreateServiceAccountKey"

### kubernetes (--without-pipeline)

[Kubernetes cluster-admin role binding created or modified]
description = Detects a (cluster)rolebinding that grants the built-in cluster-admin role - the \
most direct Kubernetes privilege-escalation / persistence move: bind a user, group, \
or (compromised) service account to cluster-admin and you own the cluster, durably. \
The roleRef to cluster-admin is the invariant. The rule covers create, update, and \
patch, so the title says "created or modified". Almost nothing should mint or edit \
cluster-admin bindings outside controlled platform automation. \
Requires the kube-apiserver audit policy to log requestObject (Request or \
RequestResponse level) - roleRef.name lives in the request body, so at Metadata \
level this rule will not match even though audit events exist. \
Validate (purple): run "kubectl create clusterrolebinding ... --clusterrole= \
cluster-admin --serviceaccount=default:default" from dotfiles-Kali (htpx pair \
k8s-clusteradmin-binding).
search = verb IN ("create", "update", "patch") objectRef.resource IN ("clusterrolebindings", "rolebindings") requestObject.roleRef.name="cluster-admin"

[Kubernetes pod exec / attach]
description = Detects interactive access into a running pod: a create against the pods/exec or \
pods/attach subresource (kubectl exec / attach). This is the container-runtime \
equivalent of an interactive shell on a host - routine in dev, but in production it \
is the tell for hands-on-keyboard activity, debugging-as-a-foothold, or post- \
compromise lateral movement. Scope to production namespaces and alert on \
exec/attach by human users (not controllers/service accounts). \
Validate (purple): run "kubectl exec -it <pod> -- sh" from dotfiles-Kali (htpx pair \
k8s-exec). Requires the kube-apiserver audit policy logging the exec subresource.
search = verb="create" objectRef.resource="pods" objectRef.subresource IN ("exec", "attach")

[Kubernetes privileged / host-namespace pod created (node escape)]
description = Detects creation of a pod that can escape to the node: a privileged container, \
host PID namespace sharing, or a hostPath mount of the root filesystem. These are \
the building blocks of the classic "privileged pod -> nsenter into PID 1" container \
breakout (the three the detection below actually matches). Almost nothing in a \
hardened cluster legitimately requests privileged/hostPID; gate them with admission \
control (PSA restricted) and alert on the rest. \
Validate (purple): run the privileged-pod/nsenter breakout from dotfiles-Kali \
(htpx pair k8s-privileged-pod). Requires the kube-apiserver audit policy logging \
pod create at RequestResponse level (so requestObject is present).
search = verb="create" objectRef.resource="pods" requestObject.spec.containers.securityContext.privileged=true OR requestObject.spec.hostPID=true OR requestObject.spec.volumes.hostPath.path="/"

### okta (--without-pipeline)

[Okta API token created (programmatic persistence)]
description = Detects creation of an Okta API token (System Log event system.api_token.create). \
An API token is long-lived, carries the creator's privileges, and is used \
non-interactively - so it bypasses MFA and survives the creator's password/session \
reset: a clean tenant-persistence backdoor after an admin compromise. API tokens \
should come from a small, known set of service integrations; one minted by an \
unexpected actor (especially a human admin during an incident) is the tell. \
Validate (purple): mint an API token from dotfiles-Kali (htpx pair okta-api-token).
search = eventType="system.api_token.create"

[Okta identity provider created or activated (federation backdoor)]
description = Detects a new inbound identity provider being added/activated in Okta \
(system.idp.lifecycle.create / .activate). Adding an attacker-controlled IdP lets \
them federate in as arbitrary users — an authentication backdoor that sidesteps \
passwords and MFA, the technique behind several high-profile Okta tenant \
compromises. IdP changes are rare and high-impact, so any create/activate by an \
unexpected actor warrants immediate review; pair with the source-anomaly profile. \
Validate (purple): add a rogue IdP via the admin API from dotfiles-Kali (htpx pair \
okta-idp-backdoor).
search = eventType IN ("system.idp.lifecycle.create", "system.idp.lifecycle.activate")

[Okta MFA factor reset or deactivated (account-takeover prep)]
description = Detects MFA factors being reset or deactivated on an Okta user - the \
Scattered-Spider / help-desk-social-engineering move: clear a victim's factors so \
the attacker can enroll their own and own the account. The Okta System Log event \
(user.mfa.factor.reset_all / *.deactivate) is the invariant. Routine during real \
help-desk resets, so the signal is correlation: a reset NOT preceded by a verified \
support ticket, or one immediately followed by a new-factor enrollment + sign-in \
from a new device/geo. \
Validate (purple): run the reset_factors admin-API call from dotfiles-Kali (htpx \
pair okta-mfa-reset).
search = eventType IN ("user.mfa.factor.reset_all", "user.mfa.factor.deactivate", "system.mfa.factor.deactivate")

### github (--without-pipeline)

[GitHub branch-protection tampered (unreviewed merge)]
description = Detects branch-protection tampering in the GitHub Enterprise audit log: \
protected_branch.destroy (the rule was deleted, opening the branch) or \
protected_branch.policy_override (an admin merged past a still-present rule). Both \
bypass required reviews/status checks to land unreviewed code on a protected branch \
- and the pipeline that deploys it - a supply-chain evasion. Both actions are rare \
and legitimately map to a change ticket, so a destroy quickly followed by a \
re-create (cover-tracks) or any override outside the approved window warrants review. \
Validate (purple): delete/override branch protection from dotfiles-Kali (htpx pair \
gh-branch-protection-off).
search = action IN ("protected_branch.destroy", "protected_branch.policy_override")

[GitHub deploy-key or PAT credential backdoor]
description = Detects durable-credential additions in the GitHub Enterprise audit log: \
repo.create_deploy_key (an SSH key bound to a repo - prioritize writable keys) or \
personal_access_token.access_granted (a fine-grained PAT approved against org \
resources). Both mint MFA-free, non-interactive access that survives a password \
reset, so an unexpected actor or an out-of-band grant is the tell. Reconcile new \
credentials against known CI integrations and review any created during an incident. \
Validate (purple): add a deploy key / fine-grained PAT from dotfiles-Kali (htpx pair \
gh-deploy-key-backdoor).
search = action IN ("repo.create_deploy_key", "personal_access_token.access_granted")

[GitHub self-hosted runner registered (job/secret capture)]
description = Detects registration of a self-hosted Actions runner in the GitHub Enterprise \
audit log (action self_hosted_runner.created). An attacker with repo/org admin can \
bind their own runner with a label a workflow targets; every matching job then \
executes on their host, exposing the checked-out source, injected secrets.*, and \
the ephemeral GITHUB_TOKEN - durable, non-interactive persistence that survives the \
compromised admin's password reset. Self-hosted runners are rare and long-lived, so \
a new registration by an unexpected actor, on a public repo, or with a shadowing \
label is the tell. \
Validate (purple): register a rogue runner from dotfiles-Kali (htpx pair \
gh-self-hosted-runner).
search = action="self_hosted_runner.created"

### gitlab (--without-pipeline)

[GitLab protected-branch tampered (unreviewed merge)]
description = Detects protected-branch tampering in the GitLab audit events: protected_branch_removed \
(protection deleted, opening the branch) - pair with protected_branch_created to catch \
the re-create that covers tracks. Removing protection on a default/release branch \
bypasses required approvals to land unreviewed code on a protected branch and the \
pipeline that deploys it - a supply-chain evasion (T1562.001). The action is rare and \
legitimately maps to a change ticket, so a removal outside the approved window, or a \
remove-then-recreate around a push to the same branch, warrants review. \
Validate (purple): delete protected-branch rules from dotfiles-Kali (htpx pair \
gl-protected-branch-off).
search = event_type IN ("protected_branch_removed", "protected_branch_created")

[GitLab runner associated with project (CI job/secret capture)]
description = Detects a CI runner being associated with a project in the GitLab audit events \
(event_type set_runner_associated_projects). An attacker with Maintainer/Owner can \
enable a runner they control on a target project; every CI job that lands on it runs \
on their host, exposing the checked-out source, the job's masked CI/CD variables, and \
the CI_JOB_TOKEN - durable, non-interactive persistence that survives the maintainer's \
password reset (T1543). Runners are attached to projects rarely and by a small set of \
maintainers, so an association by an unexpected actor, of an instance/group runner, or \
onto a sensitive project is the tell. \
Validate (purple): enable a rogue runner on a project from dotfiles-Kali (htpx pair \
gl-runner-hijack).
search = event_type="set_runner_associated_projects"

[GitLab access/deploy token created (durable-access backdoor)]
description = Detects durable-credential additions in the GitLab audit events: \
project_access_token_created / personal_access_token_created (an API/push credential) \
and deploy_token_created (durable clone + container-registry pull). All mint MFA-free, \
non-interactive access that survives a password reset, so an unexpected actor, a wide \
scope (api, write_repository), or an out-of-band creation is the tell (T1098). Reconcile \
new tokens against known CI integrations, prefer short expirations, and review any \
created during an incident. \
Validate (purple): mint a project access / deploy token from dotfiles-Kali (htpx pair \
gl-token-backdoor).
search = event_type IN ("project_access_token_created", "personal_access_token_created", "deploy_token_created")

### registry (--without-pipeline)

[Harbor artifact deleted (force re-pull / anti-forensics)]
description = Detects deletion of a published artifact or repository in the Harbor audit log \
(operation=delete). Deleting the known-good artifact removes the trusted baseline \
(defenders can't diff the tampered layer) and misses caches so a tag re-resolves to \
whatever was pushed last; it is also used to erase a temporarily-pushed malicious \
image after it has been pulled - indicator removal, T1070. Deletions of published \
images are rare outside retention/GC, so a manual delete - especially of a trusted \
tag, by a robot, or shortly after a push to the same repo (push-then-delete) - is the \
tell. Enable tag immutability + retention so trusted tags can't be removed. \
Validate (purple): delete a trusted artifact via the Harbor API from dotfiles-Kali \
(htpx pair harbor-artifact-delete).
search = operation="delete" resource_type IN ("artifact", "repository")

[Harbor image push (backdoored image / trusted-tag poisoning)]
description = Surfaces artifact pushes in the Harbor registry audit log (operation=push, \
resource_type=artifact) for supply-chain triage. The abuse is a trojanized image \
pushed over a trusted tag (:latest, a release tag, or a common base image) so every \
downstream build/deploy that pulls it runs the implant - MITRE T1525, Implant \
Internal Image. Most pushes are benign CI, so triage on the actor and target: a push \
to a protected repo by an unexpected actor, one that overwrites an existing tag, or a \
push outside the CI service account / build window. Compare the new digest to the last \
known-good and enforce image signing (cosign / content trust) so an unsigned overwrite \
is blocked, not just logged. \
Validate (purple): push over a trusted tag from dotfiles-Kali (htpx pair \
harbor-image-backdoor).
search = operation="push" resource_type="artifact"

[Harbor robot account created (durable registry credential)]
description = Detects creation of a Harbor robot account (operation=create, resource_type=robot). \
A robot account is a long-lived, non-interactive registry credential that bypasses \
MFA and survives a password reset - so one minted after a project-admin compromise is \
a clean persistence foothold for continued image push/pull (T1098). Robots are \
provisioned rarely by a small set of admins, so one created by an unexpected actor - \
especially a system-level robot or one scoped across all projects - warrants review. \
Reconcile new robots against known CI integrations and prefer short expirations. \
Validate (purple): mint a wide-scope robot via the Harbor API from dotfiles-Kali \
(htpx pair harbor-robot-backdoor).
search = operation="create" resource_type="robot"

### vault (--without-pipeline)

[HashiCorp Vault AppRole / auth method created (persistence)]
description = Detects creation of a Vault AppRole or enabling of an auth method in the audit device \
log: request.operation create/update on auth/approle/role/<name>, or update on \
sys/auth/<type>. An attacker mints a machine identity bound to a powerful policy with a \
non-expiring secret-id - a long-lived, non-interactive credential that keeps issuing \
tokens after the compromised operator's token is revoked (T1098). These are rare, \
admin-level changes, so one by an unexpected token - especially a role bound to root/a \
broad policy - warrants review. \
Validate (purple): create a rogue AppRole from dotfiles-Kali (htpx pair \
vault-approle-backdoor).
search = type="request" request.operation IN ("create", "update") request.path IN ("auth/approle/role/*", "sys/auth/*")

[HashiCorp Vault audit device disabled (blind the SIEM)]
description = Detects an audit device being disabled in the Vault audit log (request.operation=delete \
on a sys/audit/ path). Disabling an audit device stops subsequent requests from being \
logged, blinding the SIEM to the secret exfil that typically follows - indicator/telemetry \
removal (T1562.001). Vault logs the disable request itself (it is the last event on that \
device), so the delete is a reliable, high-severity tripwire. Audit devices are removed \
almost never outside planned maintenance; alert in real time and pair with an audit-volume \
heartbeat (a gap right after the delete is the exfil-under-cover shape). \
Validate (purple): disable an audit device from dotfiles-Kali (htpx pair \
vault-audit-disable).
search = type="request" request.operation="delete" request.path="sys/audit/*"

[HashiCorp Vault secret read (bulk-exfil triage)]
description = Surfaces KV secret reads in the Vault audit device log (request.operation=read on a \
secret/ path) for credential-store exfil triage. A single read is normal automation; \
the abuse is one identity reading many distinct secret paths in a short window - draining \
DB creds, cloud keys, and API tokens after a token compromise (T1555, Credentials from \
Password Stores). Breadth isn't expressible in a single-event Sigma rule, so this matches \
the read and leaves the volume/anomaly call to the backend: profile each token's usual \
secret set and alert on reads well beyond it, a human/interactive token sweeping secret/, \
or reads from a new source IP. \
Validate (purple): bulk-read KV secrets from dotfiles-Kali (htpx pair vault-secret-exfil).
search = type="request" request.operation="read" request.path="secret/*"

### terraform (--without-pipeline)

[Terraform Cloud agent pool created (rogue run executor)]
description = Detects creation of a Terraform Cloud/Enterprise agent pool in the audit trail \
(resource.type=agent_pool, resource.action=create). An attacker with org/workspace \
admin can create a pool, mint its agent token, and run their own tfc-agent on \
infrastructure they control; once a workspace's execution mode points at that pool, \
every plan/apply runs on their host - exposing the config, the run's injected cloud \
credentials (AWS_*, ARM_*, GOOGLE_*), and the Terraform state (T1543). Pools are \
provisioned rarely by a small set of admins, so a new one by an unexpected actor - \
especially just before a workspace is switched to agent execution mode - warrants review. \
Validate (purple): create an agent pool via the TFC API from dotfiles-Kali (htpx pair \
tfc-agent-hijack).
search = resource.type="agent_pool" resource.action="create"

[Terraform Cloud org/team API token created (durable-access backdoor)]
description = Detects creation of a Terraform Cloud authentication token in the audit trail \
(resource.type=authentication_token, resource.action=create). Org and team tokens are \
long-lived, non-interactive credentials that drive the full TFC API - queue runs, \
read/write variables, pull state - and survive the compromised user's password reset, \
so one minted by an unexpected actor is a persistence tell after a control-plane \
compromise (T1098). Reconcile new tokens against known CI integrations and prefer \
short-lived team tokens scoped to a workspace. \
Validate (purple): mint an org/team token via the TFC API from dotfiles-Kali (htpx pair \
tfc-token-backdoor).
search = resource.type="authentication_token" resource.action="create"

[Terraform Cloud workspace variable created or updated (run hijack)]
description = Detects workspace variable changes in the Terraform Cloud audit trail \
(resource.type=variable, resource.action=create/update). TFC is a deployment tool; an \
attacker can inject an environment variable that the next plan/apply carries - a \
TF_CLI_ARGS / TF_CLI_CONFIG_FILE pointing at a rogue provider mirror runs their binary \
at plan time, or a planted cloud credential redirects apply at their account - gaining \
execution across the estate with no config PR or review (T1072). Most variable changes \
are benign CI, so triage on an unexpected actor, env-var changes that alter run behavior, \
or a change immediately before a run. \
Validate (purple): inject a workspace env variable via the TFC API from dotfiles-Kali \
(htpx pair tfc-var-injection).
search = resource.type="variable" resource.action IN ("create", "update")

### jenkins (--without-pipeline)

[Jenkins user API token created (durable-access backdoor)]
description = Detects generation of a Jenkins user API token in the Audit Trail plugin log (a request \
to jenkins.security.ApiTokenProperty/generateNewToken). API tokens are long-lived, \
non-interactive credentials that drive the Jenkins REST API and CLI and survive the \
account's password reset, so one minted by an unexpected actor - or against a \
privileged/service account, or during an incident - is the persistence tell (T1098). \
Reconcile new tokens against known CI integrations and prefer short-lived tokens. \
Validate (purple): mint an API token via generateNewToken from dotfiles-Kali (htpx pair \
jenkins-api-token).
search = uri="*ApiTokenProperty/generateNewToken*"

[Jenkins job created or reconfigured (malicious job / pipeline)]
description = Detects Jenkins job creation (/createItem) or job reconfiguration \
(/job/<name>/configSubmit) in the Audit Trail plugin log. Jenkins is a deployment tool; \
a job whose build step runs attacker code executes on the controller or fans out to build \
agents (harvesting their credentials and reaching their networks), and a cron/SCM trigger \
makes it recurring (T1072). The reconfigure match is scoped to the job path so global \
system-config submits (also /configSubmit) don't trip it. Job changes are routine, so \
triage on an unexpected actor, a sensitive job, edits outside config-as-code \
(JCasC / pipeline-in-SCM), or a change immediately followed by a build. \
Validate (purple): create a job via /createItem from dotfiles-Kali (htpx pair \
jenkins-job-backdoor).
search = uri="*/createItem*" OR (uri="*/job/*" uri="*/configSubmit*")

[Jenkins Script Console accessed (controller RCE / credential dump)]
description = Detects a request to the Jenkins Groovy Script Console (/script form or /scriptText API) \
in the Audit Trail plugin log. The Script Console runs Groovy as the Jenkins process - \
instant code execution on the controller and in-memory decryption of every stored \
credential - so it is a top post-compromise move (T1059). It is admin-only and rarely \
used outside break-glass, so any hit - especially outside a change window, from a service \
account, or right before a credential-store read - is high-signal for RCE / credential \
theft. \
Validate (purple): POST Groovy to /scriptText from dotfiles-Kali (htpx pair \
jenkins-script-console).
search = uri IN ("*/scriptText*", "*/script*")
