id: fa4289bb-56bc-4865-9487-a4b1a095389c
name: Entra device-code authentication flow
description: |
  Deploy form (Microsoft Sentinel scheduled analytics rule) of the device-code
  phishing detection. Device-code is a rare auth flow for normal interactive users,
  so the flow itself is the invariant; triage by user / IP / location / app. A
  device-code sign-in from a geo or IP that doesn't match the user is the tell.
  htpx pair: device-code-phish / device-code-signin (companion-only in htpx; this is
  its first deployable form here).
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - SigninLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1528
query: |
  SigninLogs
  | where AuthenticationProtocol == "deviceCode"
  | project TimeGenerated, UserPrincipalName, IPAddress, AppDisplayName, LocationDetails, ResultType
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: UserPrincipalName
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress
version: 1.0.0
kind: Scheduled
