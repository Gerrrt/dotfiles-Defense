id: 25e4139a-1d1b-4125-ba5c-7e08d2691de1
name: Entra consent grant to a third-party app (illicit-consent triage)
description: |
  Deploy form of detections/sigma/cloud/entra_illicit_consent_grant.yml as a
  Microsoft Sentinel scheduled analytics rule. Surfaces OAuth consent-grant events
  for illicit-consent triage; the "illicit" call is a triage step (scopes + app
  reputation), not decided by the query alone. htpx pair: consent-grant.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1528
query: |
  AuditLogs
  | where OperationName in ("Consent to application", "Add delegated permission grant", "Add OAuth2PermissionGrant")
  | extend ActorUPN = tostring(InitiatedBy.user.userPrincipalName)
  | extend ActorApp = tostring(InitiatedBy.app.displayName)
  | extend Actor = coalesce(ActorUPN, ActorApp)
  | project TimeGenerated, Actor, ActorUPN, OperationName, TargetResources
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: ActorUPN
version: 1.0.0
kind: Scheduled
