id: 19186504-059b-43da-b744-4702b252c235
name: Entra service-principal credential added (app backdoor)
description: |
  Deploy form of detections/sigma/cloud/entra_sp_credential_backdoor.yml as a
  Microsoft Sentinel scheduled analytics rule. A secret/cert added to an app
  registration / service principal is a durable cloud backdoor (auth as the app:
  non-interactive, no MFA, surviving password resets). Triage by actor, target app
  privilege, and whether it fits a normal app-lifecycle change. htpx pair:
  sp-cred-backdoor. The operation name renders with an en dash or ASCII hyphen
  depending on tenant - both are matched below.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Persistence
relevantTechniques:
  - T1098.001
query: |
  AuditLogs
  | where OperationName in ("Add service principal credentials", "Add application credentials",
      "Update application - Certificates and secrets management",
      "Update application – Certificates and secrets management")
  | extend Actor = tostring(InitiatedBy.user.userPrincipalName)
  | project TimeGenerated, Actor, OperationName, TargetResources
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: Actor
version: 1.0.0
kind: Scheduled
