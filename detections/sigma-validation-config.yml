# pySigma validation config for `sigma check` (used by .github/workflows/sigma.yml).
#
# Removes only the two validators that require live MITRE downloads — the ATT&CK
# (`attacktag`) and D3FEND (`d3_fendtag`) tag dictionaries — so the structural lint
# runs HERMETICALLY (no network) and can't flake on a download. Tag *namespace and
# format* are still validated by the remaining validators; the "is this a real
# published technique ID" lookup is run separately as an advisory, non-blocking step
# in the workflow.
#
# Everything else stays on: condition/field/value sanity, duplicate ids/titles,
# detection-block correctness, status/level values, etc.
validators:
  - all
  - -attacktag
  - -d3_fendtag
