title: Kubernetes cluster-admin role binding created or modified
id: 26b4b6b8-2959-43c3-a7d1-e4f2239e397a
status: experimental
description: |
  Detects a (cluster)rolebinding that grants the built-in cluster-admin role - the
  most direct Kubernetes privilege-escalation / persistence move: bind a user, group,
  or (compromised) service account to cluster-admin and you own the cluster, durably.
  The roleRef to cluster-admin is the invariant. The rule covers create, update, and
  patch, so the title says "created or modified". Almost nothing should mint or edit
  cluster-admin bindings outside controlled platform automation.
  Requires the kube-apiserver audit policy to log requestObject (Request or
  RequestResponse level) - roleRef.name lives in the request body, so at Metadata
  level this rule will not match even though audit events exist.
  Validate (purple): run "kubectl create clusterrolebinding ... --clusterrole=
  cluster-admin --serviceaccount=default:default" from dotfiles-Kali (htpx pair
  k8s-clusteradmin-binding).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/k8s-rolebinding-audit.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.privilege_escalation
  - attack.persistence
  - attack.t1098
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    verb:
      - 'create'
      - 'update'
      - 'patch'
    objectRef.resource:
      - 'clusterrolebindings'
      - 'rolebindings'
    requestObject.roleRef.name: 'cluster-admin'
  condition: selection
falsepositives:
  - Cluster bootstrap and sanctioned platform automation (GitOps/IaC) that manages
    RBAC - allowlist those principals and review the rest.
level: high
