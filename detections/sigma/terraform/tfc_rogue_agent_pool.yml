title: Terraform Cloud agent pool created (rogue run executor)
id: eb0fb1de-dcb5-49b9-a494-c76775085395
status: experimental
description: |
  Detects creation of a Terraform Cloud/Enterprise agent pool in the audit trail
  (resource.type=agent_pool, resource.action=create). An attacker with org/workspace
  admin can create a pool, mint its agent token, and run their own tfc-agent on
  infrastructure they control; once a workspace's execution mode points at that pool,
  every plan/apply runs on their host - exposing the config, the run's injected cloud
  credentials (AWS_*, ARM_*, GOOGLE_*), and the Terraform state (T1543). Pools are
  provisioned rarely by a small set of admins, so a new one by an unexpected actor -
  especially just before a workspace is switched to agent execution mode - warrants review.
  Validate (purple): create an agent pool via the TFC API from dotfiles-Kali (htpx pair
  tfc-agent-hijack).
references:
  - https://attack.mitre.org/techniques/T1543/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/tfc-agent-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1543
logsource:
  product: terraform
  service: audit
detection:
  selection:
    resource.type: 'agent_pool'
    resource.action: 'create'
  condition: selection
falsepositives:
  - Provisioning a sanctioned agent pool - allowlist the expected admin actors and
    review pools created outside change control or alongside execution-mode changes.
level: medium
