title: Terraform Cloud org/team API token created (durable-access backdoor)
id: 441f2123-b0ba-43e3-aed1-9004b252a942
status: experimental
description: |
  Detects creation of a Terraform Cloud authentication token in the audit trail
  (resource.type=authentication_token, resource.action=create). Org and team tokens are
  long-lived, non-interactive credentials that drive the full TFC API - queue runs,
  read/write variables, pull state - and survive the compromised user's password reset,
  so one minted by an unexpected actor is a persistence tell after a control-plane
  compromise (T1098). Reconcile new tokens against known CI integrations and prefer
  short-lived team tokens scoped to a workspace.
  Validate (purple): mint an org/team token via the TFC API from dotfiles-Kali (htpx pair
  tfc-token-backdoor).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/tfc-token-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: terraform
  service: audit
detection:
  selection:
    resource.type: 'authentication_token'
    resource.action: 'create'
  condition: selection
falsepositives:
  - Onboarding a sanctioned CI integration - allowlist the expected actors and review
    org tokens created where a scoped team token would do, or any created during an incident.
level: medium
