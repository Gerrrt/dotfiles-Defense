title: Terraform Cloud workspace variable created or updated (run hijack)
id: dd42c381-a45b-4ad2-993b-ec3b57aac19e
status: experimental
description: |
  Detects workspace variable changes in the Terraform Cloud audit trail
  (resource.type=variable, resource.action=create/update). TFC is a deployment tool; an
  attacker can inject an environment variable that the next plan/apply carries - a
  TF_CLI_ARGS / TF_CLI_CONFIG_FILE pointing at a rogue provider mirror runs their binary
  at plan time, or a planted cloud credential redirects apply at their account - gaining
  execution across the estate with no config PR or review (T1072). Most variable changes
  are benign CI, so triage on an unexpected actor, env-var changes that alter run behavior,
  or a change immediately before a run.
  Validate (purple): inject a workspace env variable via the TFC API from dotfiles-Kali
  (htpx pair tfc-var-injection).
references:
  - https://attack.mitre.org/techniques/T1072/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/tfc-var-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.execution
  - attack.lateral_movement
  - attack.t1072
logsource:
  product: terraform
  service: audit
detection:
  selection:
    resource.type: 'variable'
    resource.action:
      - 'create'
      - 'update'
  condition: selection
falsepositives:
  - Routine CI variable management - allowlist the CI service identity and require
    config-as-code review; alert on env-var writes by other actors or right before a run.
level: medium
