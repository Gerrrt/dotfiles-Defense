title: AD CS certificate request (ESC1 triage surface)
id: a696e561-3c04-43da-9014-a4f6611ac897
status: experimental
description: |
  Surfaces certificate-request activity (4886/4887) for ESC1 / relay-to-ADCS
  triage. The ESC1 invariant is a request whose subjectAltName names a *different*
  principal than the requester - but that is a field-to-field comparison Sigma
  cannot express, so this rule deliberately selects the request events and leaves
  the SAN-vs-Requester comparison to the analyst / a correlation in the backend
  (pull the requested UPN from the 4886 and compare to Requester). It is therefore
  a broad triage surface, not a high-fidelity alert on its own - pair it with a
  baseline of enrollment agents and watch 5136 writes to userCertificate.
  Validate (purple): run "certipy-ad req ... -upn administrator" from dotfiles-Kali
  (hacktheplanet "AD CS abuse" fold; htpx pair adcs-esc1-certipy). Requires CA
  request auditing (auditpol / CA "Issued requests" logging) to populate 4886/4887.
references:
  - https://attack.mitre.org/techniques/T1649/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/adcs-esc1-4886.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.privilege_escalation
  - attack.t1649
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID:
      - 4886
      - 4887
  condition: selection
falsepositives:
  - Templates that legitimately enroll on behalf of others (enrollment agents) -
    triage by comparing the requested SAN UPN to the Requester; allowlist agents.
level: medium
