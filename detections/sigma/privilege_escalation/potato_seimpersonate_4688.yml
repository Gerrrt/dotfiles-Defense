title: Potato privesc - service identity spawning an interactive shell
id: 9486ed6c-4c38-457f-a475-188a978eaa4a
status: experimental
description: |
  Detection posture: moderate. SeImpersonate abuse (PrintSpoofer/GodPotato/Juicy)
  uses a legitimate impersonation API, and 4688 alone cannot show the run-as-SYSTEM
  result. This flags the shape it can see - a service identity (app-pool / machine
  account / NETWORK|LOCAL SERVICE) spawning cmd/powershell. Confirm the SYSTEM
  outcome with Sysmon 17/18 on the spoolss/DCOM named pipe and Sysmon 1 linking the
  service parent to a SYSTEM child.
  Validate (purple): run PrintSpoofer/GodPotato from dotfiles-Kali (hacktheplanet
  "Windows privilege escalation" fold; htpx pair potato-seimpersonate).
references:
  - https://attack.mitre.org/techniques/T1134/001/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/potato-seimpersonate-4688.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.privilege_escalation
  - attack.t1134.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
    User|contains:
      - 'APPPOOL'
      - 'NETWORK SERVICE'
      - 'LOCAL SERVICE'
  condition: selection
falsepositives:
  - Service accounts that legitimately shell out (scripts, monitoring) - baseline
    per host and allowlist the known parent/child pairs.
level: medium
