title: Shadow Credentials - msDS-KeyCredentialLink write
id: 97ee214e-8e8a-4bee-bb1e-88ae6a40d782
status: experimental
description: |
  Detects Shadow Credentials: a 5136 directory-object-modified event writing the
  msDS-KeyCredentialLink attribute. The attack must write this attribute to add an
  attacker-controlled key for PKINIT, so the write is the invariant. Almost nothing
  legitimately writes it except Windows Hello for Business enrollment - allowlist
  those sources and alert on the rest.
  Validate (purple): run "certipy-ad shadow auto" from dotfiles-Kali (hacktheplanet
  "Active Directory - attack paths" fold; htpx pair shadow-credentials-certipy).
  Requires the Directory Service Changes audit subcategory + a SACL on the objects.
references:
  - https://attack.mitre.org/techniques/T1556/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/shadow-credentials-5136.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.credential_access
  - attack.persistence
  - attack.t1556
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5136
    AttributeLDAPDisplayName: 'msDS-KeyCredentialLink'
  condition: selection
falsepositives:
  - Windows Hello for Business / passwordless enrollment (allowlist the AzureAD/
    enrollment service principals and the device-registration service).
level: high
