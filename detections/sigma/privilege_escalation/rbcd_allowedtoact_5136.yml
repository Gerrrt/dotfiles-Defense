title: RBCD abuse - msDS-AllowedToActOnBehalfOfOtherIdentity write
id: 275d5b31-41ce-4777-989d-b1eb016e09c5
status: experimental
description: |
  Detects resource-based constrained delegation abuse: a 5136 event writing
  msDS-AllowedToActOnBehalfOfOtherIdentity on a computer object. Configuring RBCD
  requires this write, so it is the invariant. Legitimately an admin delegating a
  service sets it; a write sourced from a normal user onto a computer object is the
  anomaly. Pair with a 4741 computer-account-created burst (the attacker's machine
  account) for higher fidelity.
  Validate (purple): run the impacket addcomputer/rbcd/getST chain from dotfiles-Kali
  (hacktheplanet "Active Directory - attack paths" fold; htpx pair rbcd-impacket).
  Requires the Directory Service Changes audit subcategory + a SACL.
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/rbcd-5136.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.privilege_escalation
  - attack.persistence
  - attack.t1098
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5136
    AttributeLDAPDisplayName: 'msDS-AllowedToActOnBehalfOfOtherIdentity'
  filter_delegation_admins:
    SubjectUserName:
      - 'svc_delegation'      # replace with your delegation-admin accounts
  condition: selection and not filter_delegation_admins
falsepositives:
  - Sanctioned delegation changes by service-management admins (allowlist them).
level: high
