title: NTDS.dit theft via ntdsutil / VSS on a domain controller
id: 3e5d07b8-2e1b-4145-9f6a-ee29d7cd470f
status: experimental
description: |
  Detects local NTDS.dit extraction on a DC, which sidesteps the DCSync 4662
  replication detection entirely: ntdsutil with an ifm/create-full argument, or
  vssadmin/diskshadow/wbadmin creating a shadow copy to copy NTDS.dit + the SYSTEM
  hive out. Almost nothing legitimately runs "ntdsutil ... ifm" outside a planned
  DC backup/migration. Corroborate with event 8222 (shadow copy created).
  Validate (purple): run the ntdsutil/VSS dump from dotfiles-Kali (hacktheplanet
  "DCSync / NTDS dump" fold; htpx pair ntds-ntdsutil). Scope to DC hosts.
references:
  - https://attack.mitre.org/techniques/T1003/003/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/ntds-ntdsutil-4688.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.credential_access
  - attack.t1003.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_ntdsutil:
    Image|endswith: '\ntdsutil.exe'
    CommandLine|contains:
      - 'ifm'
      - 'create full'
  selection_shadow:
    CommandLine|contains:
      - 'vssadmin create shadow'
      - 'wbadmin start backup'
    Image|endswith:
      - '\vssadmin.exe'
      - '\wbadmin.exe'
  selection_diskshadow:
    Image|endswith: '\diskshadow.exe'
  condition: 1 of selection_*
falsepositives:
  - Scheduled DC backup software (allowlist its binary path and account).
level: high
