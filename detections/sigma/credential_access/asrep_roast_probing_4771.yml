title: AS-REP roast / Kerbrute user probing (4771 0x18)
id: c34eca90-8774-47f6-a0d7-c01b1a116c00
status: experimental
description: |
  Detects one client address generating Kerberos pre-auth failures (0x18) across
  many distinct accounts - the AS-REP roast / username-enumeration tell. A real
  user fat-fingers their own name, not five-plus others.
  Validate (purple): run "kerbrute userenum" / GetNPUsers from dotfiles-Kali
  (hacktheplanet "Microsoft Windows Kerberos" fold; htpx pair asreproast-getnpusers).
references:
  - https://attack.mitre.org/techniques/T1558/004/
correlation:
  type: value_count
  rules:
    - kerb_preauth_fail_4771
  group-by:
    - IpAddress
  timespan: 10m
  condition:
    gte: 5
    field: TargetUserName
falsepositives:
  - A jump host or service running under many identities (allowlist its address).
level: high
