title: DCSync - directory replication right requested by a non-DC
id: bc81c0e5-f587-4b57-bee4-e29d1848dbfa
status: experimental
description: |
  Detects DCSync: a 4662 directory-access event requesting the
  DS-Replication-Get-Changes-All extended right. Legitimate replication comes from
  DC machine accounts, so a user/admin principal requesting it is the anomaly -
  the replication right is the invariant the technique cannot avoid.
  Validate (purple): run impacket-secretsdump -just-dc from dotfiles-Kali
  (hacktheplanet "DCSync / NTDS dump" fold; htpx pair dcsync-secretsdump).
  Requires the Directory Service Access audit subcategory + a SACL on the domain
  head granting auditing of the replication right.
references:
  - https://attack.mitre.org/techniques/T1003/006/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/dcsync-4662.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.credential-access
  - attack.t1003.006
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4662
    Properties|contains:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'   # DS-Replication-Get-Changes
      - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'   # DS-Replication-Get-Changes-All
      - '89e95b76-444d-4c62-991a-0facbeda640c'   # DS-Replication-Get-Changes-In-Filtered-Set
  filter_dc_accounts:
    SubjectUserName|endswith: '$'
  filter_system:
    SubjectUserSid: 'S-1-5-18'
  condition: selection and not 1 of filter_*
falsepositives:
  - Azure AD Connect / other directory-sync service accounts (allowlist by SID).
  - Legitimate new domain controllers during promotion.
level: high
