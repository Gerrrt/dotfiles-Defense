title: Kerberoasting - RC4 service ticket for a user SPN
id: f61b8f0e-d702-42e6-8c4b-7a96f166b44f
status: experimental
description: |
  Detects the Kerberoasting invariant: an RC4 (0x17) TGS-REQ for a non-machine,
  non-krbtgt SPN. The encryption downgrade is the tell even when ticket flags look
  normal - roasting tools force RC4 to keep the hash crackable. Detect on the
  downgrade, not the tool name or count.
  Validate (purple): run the "Microsoft Windows Kerberos" Kerberoast fold in
  dotfiles-Kali/offensive/hacktheplanet (htpx pair: kerberoast-getuserspns <-> this);
  confirm the 4769 fires with Ticket_Encryption_Type 0x17.
references:
  - https://attack.mitre.org/techniques/T1558/003/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/kerberoasting-4769.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    TicketEncryptionType: '0x17'
  filter_machine:
    ServiceName|endswith: '$'
  filter_krbtgt:
    ServiceName: 'krbtgt'
  condition: selection and not 1 of filter_*
falsepositives:
  - Legacy applications or service accounts pinned to RC4 (baseline and allowlist).
  - Hosts still negotiating RC4 where AES is not enforced domain-wide.
level: high
