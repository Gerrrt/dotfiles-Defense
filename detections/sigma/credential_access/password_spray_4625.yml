title: Password spray base - failed network logon (4625)
id: 4e7a271e-b5c8-4285-bfe0-2c9762fa1120
status: experimental
description: |
  Base event for the password-spray correlation below: a failed logon (4625).
  Not actionable alone - the spray shape is one source against many distinct
  accounts, expressed by the correlation rule.
references:
  - https://attack.mitre.org/techniques/T1110/003/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/password-spray-4625.md
author: dotfiles-Defense
date: 2026-06-30
name: failed_logon_4625
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  filter_local:
    IpAddress:
      - '-'
      - '127.0.0.1'
      - '::1'
  condition: selection and not filter_local
falsepositives:
  - A single user with a stale cached credential (defeated by the group-by below).
level: informational
---
title: Password spray - one source, many accounts (4625)
id: 0b553ead-484c-4569-9e14-55439cecd62d
status: experimental
description: |
  Detects one source address failing against many distinct accounts in a short
  window - the spray shape, the inverse of one user fat-fingering their own
  password. Counting distinct accounts per source beats a raw failure-rate
  threshold because the spray is deliberately slow.
  Validate (purple): run kerbrute/nxc password spray from dotfiles-Kali
  (hacktheplanet "Microsoft Windows Kerberos" / "Poisoning & relay" folds).
references:
  - https://attack.mitre.org/techniques/T1110/003/
correlation:
  type: value_count
  rules:
    - failed_logon_4625
  group-by:
    - IpAddress
  timespan: 15m
  condition:
    gte: 10
    field: TargetUserName
falsepositives:
  - Shared NAT egress, VPN concentrators, or a misconfigured service host
    retrying many accounts (allowlist those source addresses).
level: high
