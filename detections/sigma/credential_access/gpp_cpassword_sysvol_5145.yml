title: GPP cpassword hunt - SYSVOL preferences XML read by a user
id: 37d35e16-6e07-457b-b899-d8ef0c4fe8f3
status: experimental
description: |
  Detects the on-wire moment of a GPP cpassword hunt: a 5145 detailed file-share
  access on the SYSVOL share whose relative target is a credential-bearing Group
  Policy Preferences XML. The decrypt is offline (Microsoft published the AES key),
  so the read is the only telemetry. Scope to interactive accounts - Group Policy
  clients (machine accounts) read these legitimately.
  Validate (purple): run "nxc -M gpp_password" from dotfiles-Kali (hacktheplanet
  SMB fold; htpx pair gpp-cpassword). Honey-policy a fake Groups.xml for a
  near-zero-FP tripwire. Requires detailed file-share auditing on DCs.
references:
  - https://attack.mitre.org/techniques/T1552/006/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/gpp-cpassword-5145.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.credential_access
  - attack.t1552.006
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5145
    ShareName|contains: 'SYSVOL'
    RelativeTargetName|endswith:
      - 'Groups.xml'
      - 'Services.xml'
      - 'ScheduledTasks.xml'
      - 'Printers.xml'
      - 'DataSources.xml'
  filter_machine:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_machine
falsepositives:
  - Admin workstations editing Group Policy Preferences (allowlist GPO admins).
level: medium
