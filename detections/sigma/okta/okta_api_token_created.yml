title: Okta API token created (programmatic persistence)
id: 4cd86f05-ea3b-40b3-b13c-58a44652dc2c
status: experimental
description: |
  Detects creation of an Okta API token (System Log event system.api_token.create).
  An API token is long-lived, carries the creator's privileges, and is used
  non-interactively - so it bypasses MFA and survives the creator's password/session
  reset: a clean tenant-persistence backdoor after an admin compromise. API tokens
  should come from a small, known set of service integrations; one minted by an
  unexpected actor (especially a human admin during an incident) is the tell.
  Validate (purple): mint an API token from dotfiles-Kali (htpx pair okta-api-token).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/okta-api-token-audit.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: okta
  service: okta
detection:
  selection:
    eventtype: 'system.api_token.create'
  condition: selection
falsepositives:
  - Onboarding a sanctioned integration - allowlist the expected admin actors and
    review tokens minted outside change windows or by interactive users.
level: medium
