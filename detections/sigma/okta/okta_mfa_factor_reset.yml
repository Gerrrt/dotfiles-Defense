title: Okta MFA factor reset or deactivated (account-takeover prep)
id: 1032e411-3cf5-4f3f-b080-ee837968d077
status: experimental
description: |
  Detects MFA factors being reset or deactivated on an Okta user - the
  Scattered-Spider / help-desk-social-engineering move: clear a victim's factors so
  the attacker can enroll their own and own the account. The Okta System Log event
  (user.mfa.factor.reset_all / *.deactivate) is the invariant. Routine during real
  help-desk resets, so the signal is correlation: a reset NOT preceded by a verified
  support ticket, or one immediately followed by a new-factor enrollment + sign-in
  from a new device/geo.
  Validate (purple): run the reset_factors admin-API call from dotfiles-Kali (htpx
  pair okta-mfa-reset).
references:
  - https://attack.mitre.org/techniques/T1556/006/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/okta-mfa-reset-audit.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.credential_access
  - attack.persistence
  - attack.t1556.006
logsource:
  product: okta
  service: okta
detection:
  selection:
    eventType:
      - 'user.mfa.factor.reset_all'
      - 'user.mfa.factor.deactivate'
      - 'system.mfa.factor.deactivate'
  condition: selection
falsepositives:
  - Legitimate help-desk MFA resets - correlate with an approved ticket and the
    subsequent re-enrollment device/geo; allowlist trusted admin actors.
level: medium
