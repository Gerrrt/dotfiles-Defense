title: Okta identity provider created or activated (federation backdoor)
id: 5ee9b695-f1a5-4449-9796-6135d2502461
status: experimental
description: |
  Detects a new inbound identity provider being added/activated in Okta
  (system.idp.lifecycle.create / .activate). Adding an attacker-controlled IdP lets
  them federate in as arbitrary users — an authentication backdoor that sidesteps
  passwords and MFA, the technique behind several high-profile Okta tenant
  compromises. IdP changes are rare and high-impact, so any create/activate by an
  unexpected actor warrants immediate review; pair with the source-anomaly profile.
  Validate (purple): add a rogue IdP via the admin API from dotfiles-Kali (htpx pair
  okta-idp-backdoor).
references:
  - https://attack.mitre.org/techniques/T1556/
  - https://attack.mitre.org/techniques/T1484/002/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/okta-idp-audit.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.defense_evasion
  - attack.persistence
  - attack.t1556
  - attack.t1484.002
logsource:
  product: okta
  service: okta
detection:
  selection:
    eventType:
      - 'system.idp.lifecycle.create'
      - 'system.idp.lifecycle.activate'
  condition: selection
falsepositives:
  - Sanctioned federation onboarding by IAM admins - rare; allowlist the change
    window and actor, and alert on everything else.
level: high
