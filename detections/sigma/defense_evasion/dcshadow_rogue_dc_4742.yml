title: DCShadow - rogue DC registration (GC SPN added to a non-DC)
id: 3c3d5649-ecd1-40dc-b602-1bfe104d55c8
status: experimental
description: |
  Detects DCShadow: to push changes as fake DC-to-DC replication, the attacker
  must briefly make the directory treat a non-DC as a DC, which adds a global-
  catalog SPN (GC/...) to a computer account (4742) and creates an nTDSDSA/server
  object (5137). The GC SPN write onto an account that isn't an established domain
  controller is the cleanest invariant. Corroborate with 5137 creating an
  nTDSDSA/server object and 4662 replication sourced from outside your DC inventory.
  Validate (purple): run mimikatz lsadump::dcshadow from dotfiles-Kali (hacktheplanet
  "Active Directory - attack paths" fold; htpx pair dcshadow). Allowlist your real
  DC computer accounts below.
references:
  - https://attack.mitre.org/techniques/T1207/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/dcshadow-4742.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.defense_evasion
  - attack.t1207
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4742
    ServicePrincipalNames|contains: 'GC/'
  filter_real_dcs:
    TargetUserName:
      - 'DC1$'        # replace with your real domain-controller computer accounts
      - 'DC2$'
  condition: selection and not filter_real_dcs
falsepositives:
  - Promotion of a legitimate new domain controller (allowlist during the change
    window, then add it to filter_real_dcs).
level: high
