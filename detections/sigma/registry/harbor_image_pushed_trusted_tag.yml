title: Harbor image push (backdoored image / trusted-tag poisoning)
id: 3afe0d4d-b997-4a87-821d-83328a205dd2
status: experimental
description: |
  Surfaces artifact pushes in the Harbor registry audit log (operation=push,
  resource_type=artifact) for supply-chain triage. The abuse is a trojanized image
  pushed over a trusted tag (:latest, a release tag, or a common base image) so every
  downstream build/deploy that pulls it runs the implant - MITRE T1525, Implant
  Internal Image. Most pushes are benign CI, so triage on the actor and target: a push
  to a protected repo by an unexpected actor, one that overwrites an existing tag, or a
  push outside the CI service account / build window. Compare the new digest to the last
  known-good and enforce image signing (cosign / content trust) so an unsigned overwrite
  is blocked, not just logged.
  Validate (purple): push over a trusted tag from dotfiles-Kali (htpx pair
  harbor-image-backdoor).
references:
  - https://attack.mitre.org/techniques/T1525/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/harbor-image-push-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1525
logsource:
  product: harbor
  service: audit
detection:
  selection:
    operation: 'push'
    resource_type: 'artifact'
  condition: selection
falsepositives:
  - Routine CI publishing images - allowlist the build service account and its repos;
    alert on pushes by other actors, tag overwrites, and out-of-window pushes.
level: medium
