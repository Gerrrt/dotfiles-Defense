title: Harbor robot account created (durable registry credential)
id: 9866fe79-8914-4737-9068-0e4aa0aa522d
status: experimental
description: |
  Detects creation of a Harbor robot account (operation=create, resource_type=robot).
  A robot account is a long-lived, non-interactive registry credential that bypasses
  MFA and survives a password reset - so one minted after a project-admin compromise is
  a clean persistence foothold for continued image push/pull (T1098). Robots are
  provisioned rarely by a small set of admins, so one created by an unexpected actor -
  especially a system-level robot or one scoped across all projects - warrants review.
  Reconcile new robots against known CI integrations and prefer short expirations.
  Validate (purple): mint a wide-scope robot via the Harbor API from dotfiles-Kali
  (htpx pair harbor-robot-backdoor).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/harbor-robot-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: harbor
  service: audit
detection:
  selection:
    operation: 'create'
    resource_type: 'robot'
  condition: selection
falsepositives:
  - Onboarding a sanctioned CI integration - allowlist the expected admin actors and
    review robots created outside change windows or scoped across all projects.
level: medium
