title: Harbor artifact deleted (force re-pull / anti-forensics)
id: b2ee0507-2ea5-4906-a1a4-2176301de638
status: experimental
description: |
  Detects deletion of a published artifact or repository in the Harbor audit log
  (operation=delete). Deleting the known-good artifact removes the trusted baseline
  (defenders can't diff the tampered layer) and misses caches so a tag re-resolves to
  whatever was pushed last; it is also used to erase a temporarily-pushed malicious
  image after it has been pulled - indicator removal, T1070. Deletions of published
  images are rare outside retention/GC, so a manual delete - especially of a trusted
  tag, by a robot, or shortly after a push to the same repo (push-then-delete) - is the
  tell. Enable tag immutability + retention so trusted tags can't be removed.
  Validate (purple): delete a trusted artifact via the Harbor API from dotfiles-Kali
  (htpx pair harbor-artifact-delete).
references:
  - https://attack.mitre.org/techniques/T1070/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/harbor-artifact-delete-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.defense_evasion
  - attack.t1070
logsource:
  product: harbor
  service: audit
detection:
  selection:
    operation: 'delete'
    resource_type:
      - 'artifact'
      - 'repository'
  condition: selection
falsepositives:
  - Retention/GC policy or an admin pruning old tags - allowlist the GC service account
    and alert on deletes of trusted tags or deletes closely following a push.
level: medium
