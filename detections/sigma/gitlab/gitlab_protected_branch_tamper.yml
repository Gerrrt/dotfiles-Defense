title: GitLab protected-branch tampered (unreviewed merge)
id: 029e5b7d-7355-4d56-969b-d18f6726f913
status: experimental
description: |
  Detects protected-branch tampering in the GitLab audit events: protected_branch_removed
  (protection deleted, opening the branch) - pair with protected_branch_created to catch
  the re-create that covers tracks. Removing protection on a default/release branch
  bypasses required approvals to land unreviewed code on a protected branch and the
  pipeline that deploys it - a supply-chain evasion (T1562.001). The action is rare and
  legitimately maps to a change ticket, so a removal outside the approved window, or a
  remove-then-recreate around a push to the same branch, warrants review.
  Validate (purple): delete protected-branch rules from dotfiles-Kali (htpx pair
  gl-protected-branch-off).
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/gl-protected-branch-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  product: gitlab
  service: audit
detection:
  selection:
    event_type:
      - 'protected_branch_removed'
      - 'protected_branch_created'
  condition: selection
falsepositives:
  - Legitimate branch-protection changes by a maintainer during an approved change
    window - reconcile against the change ticket and alert on out-of-band tampering.
level: high
