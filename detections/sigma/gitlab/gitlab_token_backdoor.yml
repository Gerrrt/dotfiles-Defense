title: GitLab access/deploy token created (durable-access backdoor)
id: 60edbefc-83ba-4d29-ba93-1e1890392764
status: experimental
description: |
  Detects durable-credential additions in the GitLab audit events:
  project_access_token_created / personal_access_token_created (an API/push credential)
  and deploy_token_created (durable clone + container-registry pull). All mint MFA-free,
  non-interactive access that survives a password reset, so an unexpected actor, a wide
  scope (api, write_repository), or an out-of-band creation is the tell (T1098). Reconcile
  new tokens against known CI integrations, prefer short expirations, and review any
  created during an incident.
  Validate (purple): mint a project access / deploy token from dotfiles-Kali (htpx pair
  gl-token-backdoor).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/gl-token-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: gitlab
  service: audit
detection:
  selection:
    event_type:
      - 'project_access_token_created'
      - 'personal_access_token_created'
      - 'deploy_token_created'
  condition: selection
falsepositives:
  - Onboarding a sanctioned CI integration or deploy automation - allowlist the expected
    actors and review tokens created outside change windows or with broad scopes.
level: medium
