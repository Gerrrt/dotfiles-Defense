title: GitLab runner associated with project (CI job/secret capture)
id: 7bcc1182-7e54-4f1f-81a3-8f8b6853a153
status: experimental
description: |
  Detects a CI runner being associated with a project in the GitLab audit events
  (event_type set_runner_associated_projects). An attacker with Maintainer/Owner can
  enable a runner they control on a target project; every CI job that lands on it runs
  on their host, exposing the checked-out source, the job's masked CI/CD variables, and
  the CI_JOB_TOKEN - durable, non-interactive persistence that survives the maintainer's
  password reset (T1543). Runners are attached to projects rarely and by a small set of
  maintainers, so an association by an unexpected actor, of an instance/group runner, or
  onto a sensitive project is the tell.
  Validate (purple): enable a rogue runner on a project from dotfiles-Kali (htpx pair
  gl-runner-hijack).
references:
  - https://attack.mitre.org/techniques/T1543/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/gl-runner-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1543
logsource:
  product: gitlab
  service: audit
detection:
  selection:
    event_type: 'set_runner_associated_projects'
  condition: selection
falsepositives:
  - Provisioning a sanctioned runner - allowlist the expected maintainers and runners
    and review associations outside change control or onto sensitive projects.
level: medium
