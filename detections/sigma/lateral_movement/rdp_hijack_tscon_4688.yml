title: RDP session hijack - tscon redirect to an RDP endpoint
id: b60118d5-1b56-4de9-a188-e69c1554d590
status: experimental
description: |
  Detects RDP session hijacking: a process creation carrying a
  "tscon ... /dest:rdp-tcp#" command line. The hijack cannot happen without it, so
  this is a near-zero-false-positive tell - admins almost never tscon to another
  session's RDP endpoint by hand, and the SYSTEM-via-service variant
  (sc create ... tscon) is even louder.
  Validate (purple): run the tscon/sc-create hijack from dotfiles-Kali (hacktheplanet
  "Lateral movement & remote execution" fold; htpx pair rdp-hijack-tscon).
references:
  - https://attack.mitre.org/techniques/T1563/002/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/rdp-hijack-4688.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.lateral_movement
  - attack.t1563.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains: '/dest:rdp-tcp#'
  condition: selection
falsepositives:
  - Rare helpdesk shadow/remote-control tooling that wraps tscon (allowlist it).
level: high
