title: WMI remote exec - shell spawned by WmiPrvSE
id: e367cca9-bbab-4a16-a15e-38839cb0849a
status: experimental
description: |
  Detects WMI-based remote execution (impacket-wmiexec, nxc --exec-method wmiexec):
  the payload runs as a child of WmiPrvSE.exe with no service install (7045) to
  catch. A process creation whose parent is WmiPrvSE.exe spawning cmd/powershell is
  the signal - especially with impacket's "cmd.exe /Q /c ... 1> \\127.0.0.1\ADMIN$"
  output-redirect shape. Legit WMI providers spawn children too, so pair the parent
  with a shell target and the SMB output-redirect string.
  Validate (purple): run impacket-wmiexec from dotfiles-Kali (hacktheplanet "Lateral
  movement & remote execution" fold; htpx pair wmiexec-impacket).
references:
  - https://attack.mitre.org/techniques/T1047/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/wmiexec-4688.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.execution
  - attack.lateral-movement
  - attack.t1047
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    ParentImage|endswith: '\WmiPrvSE.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_redirect:
    CommandLine|contains|all:
      - '\Q'
      - '\c'
      - '127.0.0.1\ADMIN$'
  condition: selection or selection_redirect
falsepositives:
  - Management software that legitimately drives WMI to run scripts (baseline and
    allowlist the specific command lines).
level: high
