title: HashiCorp Vault secret read (bulk-exfil triage)
id: 371f9c69-d831-4b7e-ba6c-8c2601f6cbe7
status: experimental
description: |
  Surfaces KV secret reads in the Vault audit device log (request.operation=read on a
  secret/ path) for credential-store exfil triage. A single read is normal automation;
  the abuse is one identity reading many distinct secret paths in a short window - draining
  DB creds, cloud keys, and API tokens after a token compromise (T1555, Credentials from
  Password Stores). Breadth isn't expressible in a single-event Sigma rule, so this matches
  the read and leaves the volume/anomaly call to the backend: profile each token's usual
  secret set and alert on reads well beyond it, a human/interactive token sweeping secret/,
  or reads from a new source IP.
  Validate (purple): bulk-read KV secrets from dotfiles-Kali (htpx pair vault-secret-exfil).
references:
  - https://attack.mitre.org/techniques/T1555/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/vault-secret-read-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.credential_access
  - attack.t1555
logsource:
  product: vault
  service: audit
detection:
  selection:
    type: 'request'
    request.operation: 'read'
    request.path|startswith: 'secret/'
  condition: selection
falsepositives:
  - Applications reading their own secrets - the common case; triage on breadth (distinct
    paths per token over a window), interactive tokens, and new source IPs, not single reads.
level: low
