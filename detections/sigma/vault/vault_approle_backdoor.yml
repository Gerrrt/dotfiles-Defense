title: HashiCorp Vault AppRole / auth method created (persistence)
id: fd142d2e-ae67-4e72-940a-2fc108663977
status: experimental
description: |
  Detects creation of a Vault AppRole or enabling of an auth method in the audit device
  log: request.operation create/update on auth/approle/role/<name>, or update on
  sys/auth/<type>. An attacker mints a machine identity bound to a powerful policy with a
  non-expiring secret-id - a long-lived, non-interactive credential that keeps issuing
  tokens after the compromised operator's token is revoked (T1098). These are rare,
  admin-level changes, so one by an unexpected token - especially a role bound to root/a
  broad policy - warrants review.
  Validate (purple): create a rogue AppRole from dotfiles-Kali (htpx pair
  vault-approle-backdoor).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/vault-approle-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: vault
  service: audit
detection:
  selection:
    type: 'request'
    request.operation:
      - 'create'
      - 'update'
  paths:
    request.path|startswith:
      - 'auth/approle/role/'
      - 'sys/auth/'
  condition: selection and paths
falsepositives:
  - Provisioning sanctioned automation - allowlist the expected admin tokens and review
    roles bound to root/broad policies or given non-expiring secret-id TTLs.
level: medium
