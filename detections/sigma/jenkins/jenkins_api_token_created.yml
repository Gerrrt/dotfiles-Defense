title: Jenkins user API token created (durable-access backdoor)
id: 970de00f-3f9e-420f-8dbc-5e3c1f9f9445
status: experimental
description: |
  Detects generation of a Jenkins user API token in the Audit Trail plugin log (a request
  to jenkins.security.ApiTokenProperty/generateNewToken). API tokens are long-lived,
  non-interactive credentials that drive the Jenkins REST API and CLI and survive the
  account's password reset, so one minted by an unexpected actor - or against a
  privileged/service account, or during an incident - is the persistence tell (T1098).
  Reconcile new tokens against known CI integrations and prefer short-lived tokens.
  Validate (purple): mint an API token via generateNewToken from dotfiles-Kali (htpx pair
  jenkins-api-token).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/jenkins-api-token-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: jenkins
  service: audit
detection:
  selection:
    uri|contains: 'ApiTokenProperty/generateNewToken'
  condition: selection
falsepositives:
  - Users provisioning their own tokens for sanctioned automation - allowlist the expected
    actors and alert on tokens minted for accounts that don't normally hold them.
level: medium
