title: Jenkins Script Console accessed (controller RCE / credential dump)
id: a1c74793-c675-4314-9d1d-c71090ccc449
status: experimental
description: |
  Detects a request to the Jenkins Groovy Script Console (/script form or /scriptText API)
  in the Audit Trail plugin log. The Script Console runs Groovy as the Jenkins process -
  instant code execution on the controller and in-memory decryption of every stored
  credential - so it is a top post-compromise move (T1059). It is admin-only and rarely
  used outside break-glass, so any hit - especially outside a change window, from a service
  account, or right before a credential-store read - is high-signal for RCE / credential
  theft.
  Validate (purple): POST Groovy to /scriptText from dotfiles-Kali (htpx pair
  jenkins-script-console).
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/jenkins-script-console-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.execution
  - attack.t1059
logsource:
  product: jenkins
  service: audit
detection:
  selection:
    uri|contains:
      - '/scriptText'
      - '/script'
  condition: selection
falsepositives:
  - Legitimate administrator break-glass use of the Script Console - allowlist the
    expected admins and change windows; treat service-account or off-hours use as an alert.
level: high
