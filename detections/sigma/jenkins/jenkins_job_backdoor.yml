title: Jenkins job created or reconfigured (malicious job / pipeline)
id: a3d57201-71d4-49fb-9a28-df32b823fb10
status: experimental
description: |
  Detects Jenkins job creation (/createItem) or reconfiguration (job/<name>/configSubmit)
  in the Audit Trail plugin log. Jenkins is a deployment tool; a job whose build step runs
  attacker code executes on the controller or fans out to build agents (harvesting their
  credentials and reaching their networks), and a cron/SCM trigger makes it recurring
  (T1072). Job changes are routine, so triage on an unexpected actor, a sensitive job, edits
  outside config-as-code (JCasC / pipeline-in-SCM), or a change immediately followed by a build.
  Validate (purple): create a job via /createItem from dotfiles-Kali (htpx pair
  jenkins-job-backdoor).
references:
  - https://attack.mitre.org/techniques/T1072/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/jenkins-job-backdoor-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.execution
  - attack.lateral_movement
  - attack.t1072
logsource:
  product: jenkins
  service: audit
detection:
  keywords:
    - '/createItem'
    - '/configSubmit'
  condition: keywords
falsepositives:
  - Routine job authoring in active shops - prefer pipelines defined in version-controlled
    Jenkinsfiles and alert on UI-side job edits that bypass that review path.
level: medium
