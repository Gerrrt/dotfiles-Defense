title: GitHub self-hosted runner registered (job/secret capture)
id: d0d00bd8-b122-4909-96e2-49d2775598fb
status: experimental
description: |
  Detects registration of a self-hosted Actions runner in the GitHub Enterprise
  audit log (action self_hosted_runner.created). An attacker with repo/org admin can
  bind their own runner with a label a workflow targets; every matching job then
  executes on their host, exposing the checked-out source, injected secrets.*, and
  the ephemeral GITHUB_TOKEN - durable, non-interactive persistence that survives the
  compromised admin's password reset. Self-hosted runners are rare and long-lived, so
  a new registration by an unexpected actor, on a public repo, or with a shadowing
  label is the tell.
  Validate (purple): register a rogue runner from dotfiles-Kali (htpx pair
  gh-self-hosted-runner).
references:
  - https://attack.mitre.org/techniques/T1543/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/gh-runner-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1543
logsource:
  product: github
  service: audit
detection:
  selection:
    action: 'self_hosted_runner.created'
  condition: selection
falsepositives:
  - Provisioning a sanctioned runner pool - allowlist the expected actors and repos
    and review registrations outside change control.
level: medium
