title: GitHub deploy-key or PAT credential backdoor
id: 42f34b55-a66d-494c-8e97-723f8c81947c
status: experimental
description: |
  Detects durable-credential additions in the GitHub Enterprise audit log:
  repo.create_deploy_key (an SSH key bound to a repo - prioritize writable keys) or
  personal_access_token.access_granted (a fine-grained PAT approved against org
  resources). Both mint MFA-free, non-interactive access that survives a password
  reset, so an unexpected actor or an out-of-band grant is the tell. Reconcile new
  credentials against known CI integrations and review any created during an incident.
  Validate (purple): add a deploy key / fine-grained PAT from dotfiles-Kali (htpx pair
  gh-deploy-key-backdoor).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/gh-cred-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: github
  service: audit
detection:
  selection:
    action:
      - 'repo.create_deploy_key'
      - 'personal_access_token.access_granted'
  condition: selection
falsepositives:
  - Onboarding a sanctioned CI integration or deploy automation - allowlist the
    expected actors and review credentials granted outside change windows.
level: medium
