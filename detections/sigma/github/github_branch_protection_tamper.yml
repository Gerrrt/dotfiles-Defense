title: GitHub branch-protection tampered (unreviewed merge)
id: 329fba40-2880-470c-ab65-41368c66ebec
status: experimental
description: |
  Detects branch-protection tampering in the GitHub Enterprise audit log:
  protected_branch.destroy (the rule was deleted, opening the branch) or
  protected_branch.policy_override (an admin merged past a still-present rule). Both
  bypass required reviews/status checks to land unreviewed code on a protected branch
  - and the pipeline that deploys it - a supply-chain evasion. Both actions are rare
  and legitimately map to a change ticket, so a destroy quickly followed by a
  re-create (cover-tracks) or any override outside the approved window warrants review.
  Validate (purple): delete/override branch protection from dotfiles-Kali (htpx pair
  gh-branch-protection-off).
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/gh-branch-protection-audit.md
author: dotfiles-Defense
date: 2026-07-02
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  product: github
  service: audit
detection:
  selection:
    action:
      - 'protected_branch.destroy'
      - 'protected_branch.policy_override'
  condition: selection
falsepositives:
  - Legitimate policy changes by a repo admin during an approved change window -
    reconcile against the change ticket and alert on out-of-band tampering.
level: high
