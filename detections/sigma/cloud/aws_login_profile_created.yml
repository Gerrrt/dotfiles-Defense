title: AWS IAM login profile created or updated (console takeover)
id: 47f3ada3-a78d-423a-881e-6a5352ce892b
status: experimental
description: |
  Detects CloudTrail CreateLoginProfile / UpdateLoginProfile - giving a
  programmatic-only IAM user a console password, or resetting another user's, is
  account takeover. A login profile is normally set once at user creation by an
  admin, and users reset only their own, so CreateLoginProfile on an existing user
  or UpdateLoginProfile where actor != target is the tell. Pairs with the
  CreateAccessKey alert for the full console+API takeover.
  Validate (purple): run "aws iam create-login-profile --user-name <other>" from
  dotfiles-Kali (htpx pair aws-console-login-profile).
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/aws-loginprofile-cloudtrail.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: 'iam.amazonaws.com'
    eventName:
      - 'CreateLoginProfile'
      - 'UpdateLoginProfile'
  condition: selection
falsepositives:
  - Admin onboarding a new console user, or a user resetting their own password
    (triage actor vs target and whether the target is privileged).
level: medium
