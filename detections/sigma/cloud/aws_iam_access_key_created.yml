title: AWS IAM access key created (backdoor triage)
id: 8b569fc9-809b-4e3a-87e6-b77cac86a643
status: experimental
description: |
  Surfaces CloudTrail CreateAccessKey for IAM access-key-backdoor triage. The abuse
  invariant is actor != target (a principal minting a key for another, usually more
  privileged, user) - but that field-to-field comparison isn't expressible in Sigma,
  so this matches the event and leaves the actor-vs-target call to the analyst /
  backend. Compare userIdentity (actor) to requestParameters.userName (target);
  alert when they differ or the target is privileged.
  Validate (purple): run "aws iam create-access-key --user-name <other>" / Pacu
  iam__backdoor_users_keys from dotfiles-Kali (htpx pair aws-iam-backdoor-key).
references:
  - https://attack.mitre.org/techniques/T1098/001/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/aws-createaccesskey-cloudtrail.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.persistence
  - attack.t1098.001
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: 'iam.amazonaws.com'
    eventName: 'CreateAccessKey'
  condition: selection
falsepositives:
  - Users rotating their own access key (actor == target) - the common case; triage
    on the actor-vs-target mismatch and on keys minted toward privileged users.
level: medium
