title: Entra service-principal credential added (app backdoor)
id: 73a70b60-05ed-4f99-a380-175d62df0b24
status: experimental
description: |
  Detects a credential (client secret or certificate) being added to an Entra app
  registration / service principal - the durable cloud backdoor: the attacker then
  authenticates as the app, non-interactive, no MFA, surviving user password resets.
  The credential-add audit event is the invariant; triage by who did it, which
  (privileged) app it targets, and whether it lines up with a normal app-lifecycle
  change. A credential added to a high-privilege app by an unexpected actor is the
  tell.
  Validate (purple): run "az ad app credential reset" / Add-MgApplicationPassword
  from dotfiles-Kali (htpx pair sp-cred-backdoor; companion-only, M365/Entra section).
references:
  - https://attack.mitre.org/techniques/T1098/001/
  - https://github.com/Gerrrt/htpx/blob/main/entries/blue/sp-cred-auditlogs.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.persistence
  - attack.t1098.001
logsource:
  product: azure
  service: auditlogs
detection:
  selection:
    OperationName:
      - 'Add service principal credentials'
      - 'Add application credentials'
      - 'Update application - Certificates and secrets management'
      - 'Update application – Certificates and secrets management'
  condition: selection
falsepositives:
  - Routine secret/cert rotation by app owners or CI/CD automation (baseline the
    expected actors and apps; alert on credentials added to privileged apps or by
    unexpected principals).
level: medium
