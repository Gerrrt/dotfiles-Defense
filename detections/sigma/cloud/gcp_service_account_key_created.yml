title: GCP user-managed service-account key created
id: fa087bf0-f2fb-4e40-a676-c448718da9f7
status: experimental
description: |
  Detects creation of a user-managed service-account key
  (google.iam.admin.v1.CreateServiceAccountKey) in GCP Cloud Audit Logs. These keys
  are long-lived credentials outside SSO/MFA and are the classic GCP persistence
  backdoor - Google recommends disabling them. Alert on creation for privileged
  service accounts, by unexpected actors, or anywhere org policy forbids user-managed
  keys; the org-policy constraint iam.disableServiceAccountKeyCreation is the
  preventive control.
  Validate (purple): run "gcloud iam service-accounts keys create" from dotfiles-Kali
  (htpx pair gcp-sa-key).
references:
  - https://attack.mitre.org/techniques/T1098/001/
  - https://github.com/dotgibson/htpx/blob/main/entries/blue/gcp-sa-key-audit.md
author: dotfiles-Defense
date: 2026-06-30
tags:
  - attack.persistence
  - attack.t1098.001
logsource:
  product: gcp
  service: gcp.audit
detection:
  selection:
    gcp.audit.method_name: 'google.iam.admin.v1.CreateServiceAccountKey'
  condition: selection
falsepositives:
  - CI/CD or Terraform provisioning that legitimately creates SA keys (baseline the
    automation principals; prefer workload identity / short-lived creds and alert on
    the rest).
level: medium
